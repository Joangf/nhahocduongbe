spring:
  autoconfigure:
    exclude:
      - org.springframework.modulith.runtime.autoconfigure.SpringModulithRuntimeAutoConfiguration
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 3

  jpa:
    #open-in-view: false
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        "[format_sql]": true

  security:
    user:
      name: app
      password: app

  config:
    import: optional:file:.env[.properties]

server:
  error:
    whitelabel:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: '*'

logging:
  level:
    org:
      hibernate:
        #        SQL: DEBUG
        orm:
          jdbc:
            bind: TRACE
        stat: DEBUG
        SQL_SLOW: INFO
        cache: DEBUG
