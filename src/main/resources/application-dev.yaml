spring:
  autoconfigure:
    exclude:
      - org.springframework.modulith.runtime.autoconfigure.SpringModulithRuntimeAutoConfiguration
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/nhahocduong}
    username: ${DB_USERNAME:nhahocduong}
    password: ${DB_PASSWORD:nhahocduong}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 1

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:password}
  cache:
    type: redis
  jpa:
    #open-in-view: false
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        "[format_sql]": true

  security:
    user:
      name: app
      password: app

  config:
    import: optional:file:.env[.properties]

server:
  error:
    whitelabel:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: '*'

logging:
  level:
    org:
      hibernate:
        #        SQL: DEBUG
        orm:
          jdbc:
            bind: TRACE
        stat: DEBUG
        SQL_SLOW: INFO
        cache: DEBUG
