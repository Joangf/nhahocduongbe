spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/nhahocduong?currentSchema=nhahocduong
    username: nhahocduong
    password: nhahocduong
    driver-class-name: org.postgresql.Driver

  jpa:
    #open-in-view: false
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        "[format_sql]": true

  security:
    user:
      name: app
      password: app

server:
  error:
    whitelabel:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: '*'

logging:
  level:
    org:
      hibernate:
#        SQL: DEBUG
        orm:
          jdbc:
            bind: TRACE
        stat: DEBUG
        SQL_SLOW: INFO
        cache: DEBUG
