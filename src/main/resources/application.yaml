spring:
  mvc:
    problemdetails:
      enabled: true

  jpa:
    #open-in-view: false
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        "[format_sql]": true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  jackson:
    # Skip serializing null fields
    default-property-inclusion: non_null

  data:
    rest:
      base-path: /api

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  mail:
    from: ${MAIL_FROM:noreply@nhahocduong.vn}
  otp:
    expiration-minutes: ${OTP_EXPIRATION_MINUTES:5}
    max-attempts-per-hour: 5

server:
  port: 8081
  error:
    whitelabel:
      enabled: true

# FIXME: Limit Actuator endpoint exposure
management:
  endpoints:
    web:
      exposure:
        include:
          - prometheus
#        include: '*'