spring:
  mvc:
    problemdetails:
      enabled: true

  jpa:
    #open-in-view: false
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        "[format_sql]": true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  jackson:
    # Skip serializing null fields
    default-property-inclusion: non_null

  data:
    rest:
      base-path: /api

server:
  port: 8081
  error:
    whitelabel:
      enabled: true

# FIXME: Limit Actuator endpoint exposure
management:
  endpoints:
    web:
      exposure:
        include:
          - prometheus
#        include: '*'