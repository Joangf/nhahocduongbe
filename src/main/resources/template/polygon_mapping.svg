<?xml version='1.0' encoding='UTF-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 250" width="250" height="250"><defs><style>
.ts { fill: white; stroke: #555; stroke-width: 1.5; }
.lbl-m { font-family: Arial, Helvetica, sans-serif; font-size: 13px; fill: #333; text-anchor: middle; font-weight: bold; }
.lbl-s { font-family: Arial, Helvetica, sans-serif; font-size: 13px; fill: #333; text-anchor: start; font-weight: bold; }
.lbl-e { font-family: Arial, Helvetica, sans-serif; font-size: 13px; fill: #333; text-anchor: end; font-weight: bold; }
.ln { stroke: #666; stroke-width: 1.5; stroke-dasharray: 2,2; }
.chew-ln { stroke: #666; stroke-width: 1.5; stroke-dasharray: 2,2; }
</style></defs><g transform="translate(100, 100)"><polygon class="ts" points="0,0 50,0 35,15 15,15" /><polygon class="ts" points="0,0 15,15 15,35 0,50" /><polygon class="ts" points="50,0 50,50 35,35 35,15" /><polygon class="ts" points="0,50 15,35 35,35 50,50" /><rect class="ts" x="15" y="15" width="20" height="20" /></g><line class="ln" x1="125" y1="75" x2="125" y2="100" /><text class="lbl-m" x="125" y="65">Ngoài (N)</text><line class="ln" x1="125" y1="175" x2="125" y2="150" /><text class="lbl-m" x="125" y="195">Trong (T)</text><line class="ln" x1="75" y1="125" x2="100" y2="125" /><text class="lbl-e" x="65" y="130">Xa (X)</text><line class="ln" x1="175" y1="125" x2="150" y2="125" /><text class="lbl-s" x="185" y="130">Gần (G)</text><line class="chew-ln" x1="175" y1="75" x2="135" y2="115" /><text class="lbl-s" x="180" y="70">Nhai (Nh)</text></svg>